<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
	<title>Vinocat</title>
	<link rel="stylesheet" href="style.css?v=1.0.1">
	<style>
		.main-action-container {
			margin-top: 2.5rem;
			display: flex;
			justify-content: center;
			width: 100%;
		}
		#main-dash-btn {
			max-width: 400px;
		}
	</style>
</head>
<body>
	<div class="nav-toggle-container">
		<button class="nav-toggle primary-link" onclick="toggleNav()">
			✦ MENU ✦
		</button>
	</div>

	<nav class="nav-sidebar" id="sidebar">
		<div class="nav-group">
			<div class="group-label">Labs</div>
			<div class="group-links">
				<a href="https://cellar3d.vercel.app" class="poc-link">3D Cellar POC</a>
			</div>
		</div>

		<div class="nav-group">
			<div class="group-label">Info</div>
			<div class="group-links">
				<a href="history.html" class="primary-link">Technical</a>
				<a href="mailto:cat@vinocat.io" class="primary-link">Contact</a>
				<a href="#" class="primary-link disabled">Funding</a>
			</div>
		</div>
	</nav>

	<div id="ui-home">
		<h1 id="title">VINOCAT</h1>
		<p>Data-driven food & drink pairing</p>
		
		<div class="main-action-container">
			<a 
				href="https://vinocat.shares.zrok.io/dashboard" 
				id="main-dash-btn" 
				class="base-btn btn-disabled"
			>
				<span class="btn-label">✦ INITIALIZING... ✦</span>
				<span id="system-status" class="btn-detail">AWAITING_UPLINK</span>
			</a>
		</div>
	</div>

	<footer class="system-footer">
	</footer>

	<script>
		function toggleNav() {
			const nav = document.getElementById('sidebar');
			const btn = document.querySelector('.nav-toggle');
			
			nav.classList.toggle('active');
			document.body.classList.toggle('nav-open');
			
			if (nav.classList.contains('active')) {
				btn.innerText = '✦ CLOSE ✦';
				btn.classList.add('is-active');
			} else {
				btn.innerText = '✦ MENU ✦';
				btn.classList.remove('is-active');
			}
		}

		async function checkVMK() {
			const mainBtn = document.getElementById('main-dash-btn');
			const statusText = document.getElementById('system-status');
			const btnLabel = mainBtn.querySelector('.btn-label');
			
			const controller = new AbortController();
			const timeout = setTimeout(() => controller.abort(), 2000);

			try {
				const res = await fetch('https://vinocat.shares.zrok.io/api/status', {
					method: 'GET',
					signal: controller.signal,
					headers: { 'x-vinocat-client': 'VINOCAT_DASH_ALPHA_2026' }
				});

				if (res.ok) {
					const data = await res.json();
					if (data.status === 'ONLINE') {
						const version = data.version || 'v?.?.?';
						mainBtn.classList.remove('btn-disabled', 'support-link');
						mainBtn.classList.add('active-link');
						btnLabel.innerText = '✦ ENTER DASHBOARD ✦';
						// Displays the version in the status line
						statusText.innerText = `[ ${version} // ONLINE ]`;
						return;
					}
				}
				throw new Error('Maintenance');
			} catch (e) {
				mainBtn.classList.remove('btn-disabled', 'active-link');
				mainBtn.classList.add('support-link');
				btnLabel.innerText = '✦ NODE OFFLINE ✦';
				statusText.innerText = '[ SYSTEM_MAINTENANCE_IN_PROGRESS ]';
				
				mainBtn.addEventListener('click', (event) => {
					event.preventDefault();
				});
			} finally {
				clearTimeout(timeout);
			}
		}
		
		checkVMK();
	</script>

	<script type="importmap">
		{
			"imports": {
				"three": "https://unpkg.com/three@0.160.0/build/three.module.js"
			}
		}
	</script>

	<script type="module" src="script.js"></script>
</body>
</html>
